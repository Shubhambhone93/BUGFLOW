<!DOCTYPE html>
<html>
<head>
    <title>BugFlow Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">

        <h2>BugFlow</h2>

        <ul>
            <li>Dashboard</li>
            <li>Bugs</li>
            <li>Report Bug</li>
            <li>Projects</li>
            <li>Reports</li>
            <li>Logout</li>
        </ul>

    </div>

    <div class="main">

        <h1>Dashboard</h1>

        <div class="cards">

            <div class="card">
                <h3>Total Bugs</h3>
                <p>35</p>
            </div>

            <div class="card">
                <h3>Open Bugs</h3>
                <p>12</p>
            </div>

            <div class="card">
                <h3>In Progress</h3>
                <p>8</p>
            </div>

            <div class="card">
                <h3>Resolved</h3>
                <p>15</p>
            </div>

        </div>

        <h2>Recent Bugs</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Login Error</td>
                <td>Open</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Payment Issue</td>
                <td>Resolved</td>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
